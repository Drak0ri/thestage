<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Stage</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app">

    <header id="site-header">
      <div id="header-left">
        <span id="logo">&#127917; THE STAGE</span>
        <span id="subtitle">your team world</span>
      </div>
      <div id="header-right">
        <button class="px-btn room-btn active" data-room="stage">&#127917; STAGE</button>
        <button class="px-btn room-btn" data-room="boardroom">&#127963; BOARD</button>
        <button class="px-btn room-btn" data-room="playground">&#127912; PLAY</button>
        <button class="px-btn room-btn" data-room="outdoor" onclick="TileMap&&TileMap.movePlayerTo&&TileMap.movePlayerTo(30,20)">&#127757; OUTSIDE</button>
        <div style="width:1px;background:var(--border);margin:0 4px;align-self:stretch;"></div>
        <button class="px-btn" id="btn-meeting">&#9873; MEETING</button>
        <button class="px-btn" id="btn-add">&#65291; ADD</button>
        <button class="px-btn" id="btn-dismiss" style="display:none">&#10005; DISMISS</button>
      </div>
    </header>

    <div id="world-container">
      <div id="stars-layer"></div>
      <canvas id="bg-canvas"></canvas>
      <canvas id="world-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;cursor:crosshair;"></canvas>
      <div id="chars-layer"></div>
      <div id="world-hud">
        <span id="status-bar">use arrow keys or click to move · walk through doors to enter buildings</span>
      </div>
    </div>

    <div id="chat-panel">
      <div id="chat-header">
        <canvas id="chat-avatar" width="36" height="54"></canvas>
        <div id="chat-meta">
          <div id="chat-name">&#8212;</div>
          <div id="chat-role">&#8212;</div>
        </div>
        <button class="px-btn danger" id="chat-close">&#10005;</button>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="say something..." maxlength="300" autocomplete="new-password">
        <button class="px-btn accent" id="chat-send">&#9654; SEND</button>
      </div>
    </div>

  </div>

  <div id="add-modal" class="modal-overlay">
    <div class="modal-box">
      <h3>ADD TEAM MEMBER</h3>
      <label>Name</label>
      <input id="new-name" type="text" placeholder="e.g. Sarah" maxlength="24" autocomplete="new-password">
      <label>Role <span style="opacity:0.5">(optional)</span></label>
      <input id="new-role" type="text" placeholder="e.g. Admin, Dev..." maxlength="40" autocomplete="new-password">
      <div class="modal-btns">
        <button class="px-btn" id="add-cancel">CANCEL</button>
        <button class="px-btn accent" id="add-confirm">ADD &#9654;</button>
      </div>
    </div>
  </div>


  <!-- PIN OVERLAY -->
  <div id="pin-overlay" style="display:none;position:fixed;inset:0;background:#0a0914;z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <div style="font-family:'Press Start 2P',monospace;font-size:14px;color:#ffcc44;margin-bottom:8px;">&#127917; THE STAGE</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:#6677aa;margin-bottom:16px;">enter PIN to continue</div>
    <input id="pin-input" type="password" maxlength="20" autocomplete="new-password"
      style="font-family:'Press Start 2P',monospace;font-size:10px;background:#1a1a2e;color:#fff;border:2px solid #5555cc;border-radius:4px;padding:10px 14px;outline:none;text-align:center;width:180px;"
      onkeydown="if(event.key==='Enter')App.submitPin()">
    <button onclick="App.submitPin()"
      style="font-family:'Press Start 2P',monospace;font-size:8px;background:#5555cc;color:#fff;border:2px solid #8888ff;border-radius:4px;padding:10px 20px;cursor:pointer;">
      ENTER &#9654;
    </button>
  </div>

  <script src="js/rooms.js"></script>
  <script src="js/chars.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/maps.js"></script>
  <script src="js/topdown.js"></script>
  <script src="js/tilemap.js"></script>
  <script src="js/objects.js"></script>
  <script src="js/puzzles.js"></script>
  <script src="js/world.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
